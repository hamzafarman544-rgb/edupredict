version: "3.9"

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: edupredict-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: edupredict

  # ── ML Service (Flask) ───────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: edupredict-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
    volumes:
      - ./ml-service/model:/app/model  # persist trained model

  # ── Backend (Node.js) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupredict-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/edupredict
      JWT_SECRET: change_this_to_a_secure_random_string_in_production
      JWT_EXPIRES_IN: 7d
      ML_SERVICE_URL: http://ml-service:5001
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - ml-service

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edupredict-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - backend

volumes:
  mongo_data:
